<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BiamOS — Base for Intent & AI Middleware. An intent-driven AI middleware for any REST API." />
    <title>BiamOS</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
    <style>
      /* ── Instant Splash (visible before React loads) ── */
      body { margin: 0; background: #060614; overflow: hidden; }
      #native-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #0f0f2e 0%, #060614 70%);
        font-family: 'Inter', sans-serif;
        transition: opacity 0.5s ease-out;
      }
      #native-splash.fade-out { opacity: 0; pointer-events: none; }
      #native-splash .glow {
        position: absolute; width: 300px; height: 300px; border-radius: 50%;
        background: radial-gradient(circle, rgba(88,28,255,0.12) 0%, transparent 70%);
        animation: glowPulse 2.5s ease-in-out infinite;
      }
      #native-splash .logo {
        position: relative; z-index: 1;
        font-size: 3.5rem; font-weight: 900; letter-spacing: -0.04em;
        background: linear-gradient(135deg, #a78bfa 0%, #581cff 40%, #00c8ff 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: logoIn 0.8s ease-out;
      }
      #native-splash .tagline {
        position: relative; z-index: 1;
        color: rgba(167,139,250,0.5); font-size: 0.95rem; font-weight: 500;
        letter-spacing: 0.15em; text-transform: uppercase; margin-top: 6px;
        animation: fadeIn 1s ease-out 0.3s both;
      }
      #native-splash .bar-track {
        position: relative; z-index: 1;
        width: 200px; height: 2px; border-radius: 1px;
        background: rgba(255,255,255,0.05); margin-top: 32px;
        overflow: hidden; animation: fadeIn 1s ease-out 0.5s both;
      }
      #native-splash .bar-fill {
        width: 40%; height: 100%; border-radius: 1px;
        background: linear-gradient(90deg, transparent, #581cff, #00c8ff, transparent);
        animation: slide 1.8s ease-in-out infinite;
      }
      #native-splash .status {
        position: relative; z-index: 1;
        color: rgba(255,255,255,0.3); font-size: 0.72rem; font-weight: 400;
        letter-spacing: 0.05em; margin-top: 12px;
        animation: fadeIn 1s ease-out 0.7s both;
      }
      #native-splash .ver {
        position: absolute; bottom: 24px;
        color: rgba(255,255,255,0.1); font-size: 0.65rem;
        font-weight: 500; letter-spacing: 0.08em;
      }
      /* particles */
      #native-splash .p {
        position: absolute; border-radius: 50%;
        background: rgba(88,28,255,0.5);
      }
      @keyframes glowPulse {
        0%,100% { transform: scale(1); opacity: 0.5; }
        50%     { transform: scale(1.15); opacity: 1; }
      }
      @keyframes logoIn {
        0%   { opacity: 0; transform: translateY(20px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes fadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0) scale(1); }
        50%     { transform: translateY(-30px) scale(1.3); }
      }
    </style>
  </head>
  <body>
    <!-- ── Native splash (pure HTML, visible immediately) ── -->
    <div id="native-splash">
      <div class="glow"></div>
      <div class="logo">BiamOS</div>
      <div class="tagline">Base for Intent & AI Middleware</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="status">Initializing...</div>
      <div class="ver">v2.0</div>
      <!-- Particles generated inline for instant render -->
      <script>
        (function() {
          var c = document.getElementById('native-splash');
          for (var i = 0; i < 25; i++) {
            var d = document.createElement('div');
            d.className = 'p';
            var s = 2 + Math.random() * 3;
            d.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) +
              '%;width:' + s + 'px;height:' + s + 'px;opacity:' + (0.1+Math.random()*0.3) +
              ';animation:float ' + (3+Math.random()*4) + 's ease-in-out ' + (Math.random()*3) + 's infinite';
            c.appendChild(d);
          }
          // Status text progression
          var st = c.querySelector('.status');
          setTimeout(function(){ st.textContent = 'Loading modules...'; }, 600);
          setTimeout(function(){ st.textContent = 'Connecting to backend...'; }, 1400);
          setTimeout(function(){ st.textContent = 'Preparing workspace...'; }, 2200);
        })();
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
